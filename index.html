<!DOCTYPE html>
<html lang="ja">
<head>
    
<!-- 初めて作ったからお手柔らかにね、デザインだけめんどいからAIに作ってもらったよ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLsite GOLF</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #fbbf24;
            --start: #3b82f6;
            --goal: #ef4444;
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 32px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .setup-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .mode-option {
            background: #334155;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            font-size: 13px;
            font-weight: bold;
        }

        .mode-option.active {
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(to right, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .generate-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }


        .result-area {
            margin-top: 30px;
            display: none;
        }

        .work-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .work-card:hover {
            background: rgba(255,255,255,0.07);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            min-width: 60px;
            text-align: center;
        }

        .badge-start { background: var(--start); }
        .badge-goal { background: var(--goal); }

        .work-info {
            flex-grow: 1;
            text-align: left;
        }

        .work-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .work-link {
            font-size: 12px;
            color: var(--primary);
            text-decoration: none;
        }

        /* エラー診断表示 */
        #debug-info {
            margin-top: 20px;
            font-size: 11px;
            color: #94a3b8;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>DLsite GOLF EDIT</h1>
        <p style="color: #94a3b8; font-size: 13px;">検索せずにゴールまでたどり着けるかな？</p>
        <p style="font-size: 11px; color: #64748b; margin-top: 10px;">
  ※無料サーバーの仕様上、しばらく誰も遊んでいなかった場合は最初の生成に約1分かかります。<br>
  エラーが出た場合は、もう一度ボタンを押してみてください！
</p>
    </header>

    <div class="setup-card">
        <div class="mode-selector" id="modeGroup">
            <div class="mode-option" data-mode="easy">Easy<br><span style="font-size: 10px; opacity: 0.7;">超人気作のみ！</span></div>
            <div class="mode-option active" data-mode="normal">Normal<br><span style="font-size: 10px; opacity: 0.7;">色んな作品に出会える！</span></div>
            <div class="mode-option" data-mode="voice">ASMR<br><span style="font-size: 10px; opacity: 0.7;">音声作品オンリー！</span></div>
        </div>

        <button id="generateBtn" class="generate-btn">ゲーム開始！</button>
        
        <div id="debug-info"></div>

        <div id="resultArea" class="result-area">
            <div class="work-card">
                <span class="badge badge-start">START</span>
                <div class="work-info">
                    <div class="work-title" id="startTitle">作品タイトル</div>
                    <a href="#" target="_blank" class="work-link" id="startLink">作品ページを開く ↗</a>
                </div>
            </div>

            <div style="font-size: 20px; color: #475569; margin: 5px 0;">⬇</div>

            <div class="work-card">
                <span class="badge badge-goal">GOAL</span>
                <div class="work-info">
                    <div class="work-title" id="goalTitle">作品タイトル</div>
                    <a href="#" target="_blank" class="work-link" id="goalLink">作品ページを開く ↗</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'normal';

    // モード選択の切り替えロジック
    document.querySelectorAll('.mode-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.mode-option').forEach(el => el.classList.remove('active'));
            opt.classList.add('active');
            currentMode = opt.dataset.mode;
        });
    });

    document.getElementById('generateBtn').addEventListener('click', async () => {
        const btn = document.getElementById('generateBtn');
        const debug = document.getElementById('debug-info');
        const result = document.getElementById('resultArea');

        btn.disabled = true;
        btn.innerText = "生成中...";
        debug.style.display = "none";
        debug.innerText = "";

        try {
            const apiUrl = "https://dlsite-golf-api.onrender.com/api/random-golf?mode=" + currentMode;
            
            console.log("Fetching from:", apiUrl);
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            const data = await response.json();

            document.getElementById('startTitle').innerText = data.start.title;
            document.getElementById('startLink').href = data.start.link;
            document.getElementById('goalTitle').innerText = data.goal.title;
            document.getElementById('goalLink').href = data.goal.link;

            result.style.display = "block";
        } catch (error) {
            console.error(error);
            debug.style.display = "block";
            debug.innerText = `エラーが発生しました\nﾎﾓﾜｾﾘﾝに教えてね;;`;
        } finally {
            btn.disabled = false;
            btn.innerText = "もう一回遊ぶ？";
        }
    });
</script>

</body>
</html>
